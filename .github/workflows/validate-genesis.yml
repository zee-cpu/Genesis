name: Validate Genesis

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-genesis:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run validate
      - run: npm test
